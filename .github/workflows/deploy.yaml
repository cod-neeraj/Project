name: CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: |
         cd Internship/Internship
         mvn clean package -DskipTests

      - name: Build Docker image
        working-directory: ./Internship/Internship
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/project:${{ github.sha }} .

      - name: Login to Docker Hub
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/project:${{ github.sha }}
          docker tag ${{ secrets.DOCKER_USERNAME }}/project:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/project:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/project:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/project:latest

            docker stop project || true
            docker rm project || true

            docker run -d \
              -p 8080:8080 \
              --name project \
              ${{ secrets.DOCKER_USERNAME }}/project:latest

            sleep 10

            curl -f http://localhost:8080 || exit 1
            echo "Deployment successful!"